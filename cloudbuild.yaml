steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/webmkt:$COMMIT_SHA', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/webmkt:$COMMIT_SHA']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - webmkt-service
  - --image
  - gcr.io/$PROJECT_ID/webmkt:$COMMIT_SHA
  - --region
  - asia-southeast1
  - --platform
  - managed
  - --allow-unauthenticated
  - --port
  - '80'